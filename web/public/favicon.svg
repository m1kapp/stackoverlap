  <rect x="11" y="1" width="20" height="20" rx="3" fill="#a855f7" opacity="0.5"/>
  <rect x="1" y="11" width="20" height="20" rx="3" fill="#10b981" opacity="0.5"/>
  <rect x="11" y="11" width="20" height="20" rx="3" fill="#f59e0b" opacity="0.5"/>
</svg>
